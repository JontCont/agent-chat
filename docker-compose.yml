version: '3.8'

services:
  api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data/sqlite:/data/sqlite
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=sqlite:///data/sqlite/agent.db
      - DAEMON_URL=http://host.docker.internal:7456
      - PORT=8080
