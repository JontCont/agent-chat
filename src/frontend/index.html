<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Chat Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark-dimmed.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/rust.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/typescript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/css.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/xml.min.js"></script>
</head>
<body>
    <div class="chat-container">
        <!-- Sidebar or Header Panel -->
        <header class="chat-header">
            <div class="header-info">
                <h1>Antigravity Agent Bridge</h1>
                <p>Decoupled Host Execution & Real-time SSE/WS Streaming</p>
            </div>
            <div class="status-indicator">
                <span class="status-dot" id="status-dot"></span>
                <span class="status-text" id="status-text">Connecting...</span>
            </div>
        </header>

        <!-- Messages Display Panel -->
        <main class="chat-messages" id="chat-messages">
            <div class="message system-message">
                <div class="message-content">
                    <p>Welcome! System is initializing a new session...</p>
                </div>
            </div>
        </main>

        <!-- Input Control Panel -->
        <footer class="chat-footer">
            <div class="input-container">
                <div class="attachment-preview-container" id="attachment-preview-container" style="display: none;">
                    <img id="attachment-preview" src="" alt="Preview">
                    <button class="btn-remove-attachment" id="btn-remove-attachment" title="Remove attachment">&times;</button>
                </div>
                <div class="input-row">
                    <button class="btn-attach" id="btn-attach" title="Attach Image" disabled>
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-3.31 2.69-6 6-6s6 2.69 6 6v10.5c0 4.42-3.58 8-8 8s-8-3.58-8-8V6H4v9.5c0 5.52 4.48 10 10 10s10-4.48 10-10V5c0-4.42-3.58-8-8-8s-8 3.58-8 8v12.5c0 1.1.9 2 2 2s2-.9 2-2V6h1.5z"/>
                        </svg>
                    </button>
                    <textarea id="prompt-input" placeholder="Type your prompt here..." rows="1" disabled></textarea>
                </div>
                <input type="file" id="file-input" accept="image/*" style="display: none;">
                <div class="actions">
                    <button class="btn btn-cancel" id="btn-cancel" disabled>
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/>
                        </svg>
                        Cancel
                    </button>
                    <button class="btn btn-human" id="btn-human" disabled>
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                        轉人工
                    </button>
                    <button class="btn btn-send" id="btn-send" disabled>
                        Send
                        <svg class="icon" viewBox="0 0 24 24">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <script src="index.js"></script>
</body>
</html>
